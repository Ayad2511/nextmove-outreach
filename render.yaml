services:
  # ============================================================
  # Render Cron Jobs — Next Move Marketing Outreach Automatisering
  # Alle tijden in UTC (NL = UTC+1 in winter, UTC+2 in zomer)
  # CRON_SECRET moet handmatig worden ingesteld in elk service dashboard
  # ============================================================

  - type: cron
    name: nm-enrich-instagram
    env: node
    region: frankfurt
    plan: starter
    schedule: "0 5 * * *"        # 06:00 NL
    buildCommand: echo "skip"
    startCommand: >-
      curl -sf -X POST
      https://nextmove-outreach-1.onrender.com/api/cron?job=enrich_instagram
      -H "x-cron-secret: $CRON_SECRET" || true
    envVars:
      - key: CRON_SECRET
        sync: false

